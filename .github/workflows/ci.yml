name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma generate --schema=apps/backend-api/prisma/schema.prisma

      - run: npx nx run-many --target=lint --all --parallel=3

      - run: npx nx run-many --target=test --all --parallel=3 --passWithNoTests

      - run: npx nx run-many --target=build --all --parallel=3
